<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopCopy AI — Welcome to Pro!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a; --border: #2a2a2a; --accent: #00e5a0; --text: #f0f0f0; --muted: #666; --muted2: #999; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 400; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px); background-size: 60px 60px; pointer-events: none; z-index: 0; }
  .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .orb-1 { width: 600px; height: 600px; background: rgba(0,229,160,0.08); top: 50%; left: 50%; transform: translate(-50%, -50%); }
  header { position: relative; z-index: 10; padding: 22px 40px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
  .logo { display: flex; align-items: baseline; gap: 6px; text-decoration: none; }
  .logo-mark { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--text); }
  .logo-badge { background: var(--accent); color: #000; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; }
  .success-content { position: relative; z-index: 10; flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .success-card { text-align: center; max-width: 480px; }
  .loading-state { color: var(--muted2); font-size: 15px; }
  .success-icon { font-size: 64px; margin-bottom: 20px; animation: pop 0.5s ease; }
  @keyframes pop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
  .success-card h1 { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 3px; margin-bottom: 12px; }
  .success-card h1 span { color: var(--accent); }
  .success-card p { font-size: 16px; color: var(--muted2); line-height: 1.7; margin-bottom: 32px; }
  .pro-badge-big { display: inline-block; background: rgba(0,229,160,0.1); border: 1px solid var(--accent); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; padding: 6px 16px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 24px; }
  .btn-start { display: inline-block; padding: 16px 40px; background: var(--accent); color: #000; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; text-decoration: none; }
  .btn-start:hover { background: #00ffb3; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,229,160,0.3); }
  footer { position: relative; z-index: 10; text-align: center; padding: 22px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  footer span { color: var(--accent); }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<header>
  <a href="/" class="logo"><span class="logo-mark">ShopCopy</span><span class="logo-badge">AI</span></a>
</header>
<div class="success-content">
  <div class="success-card" id="content">
    <div class="loading-state">Verifying your payment...</div>
  </div>
</div>
<footer>Built with <span>ShopCopy AI</span> — Write better copy, faster.</footer>
<script>
  async function verifyPayment() {
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const content = document.getElementById('content');

    if (!sessionId) {
      window.location.href = '/pricing';
      return;
    }

    try {
      const res = await fetch(`/api/verify?session_id=${sessionId}`);
      const data = await res.json();

      if (data.pro) {
        content.innerHTML = `
          <div class="success-icon">🎉</div>
          <div class="pro-badge-big">Pro Activated</div>
          <h1>Welcome to <span>Pro!</span></h1>
          <p>Your payment was successful. You now have unlimited AI copy generation — no daily limits, no restrictions. Start creating.</p>
          <a href="/app" class="btn-start">Open ShopCopy AI →</a>
        `;
      } else {
        content.innerHTML = `<p style="color:var(--muted2)">Payment not confirmed. <a href="/pricing" style="color:var(--accent)">Go back to pricing</a></p>`;
      }
    } catch (err) {
      content.innerHTML = `<p style="color:var(--muted2)">Something went wrong. <a href="/pricing" style="color:var(--accent)">Go back to pricing</a></p>`;
    }
  }

  verifyPayment();
</script>
</body>
</html>
